<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virtual Cupid 💘</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Cormorant Garamond', serif; background: #1a0a14; overflow: hidden; }

    /* ── INTRO OVERLAY ── */
    #intro-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #3d1a2e 0%, #1a0a14 70%);
      pointer-events: all;
    }
    #intro-overlay.hidden { display: none; }

    .hearts-bg {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .heart-float {
      position: absolute; font-size: 1.2rem; opacity: 0;
      animation: floatHeart linear infinite;
    }

    @keyframes floatHeart {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .intro-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }

    .cupid-icon {
      font-size: 5rem;
      filter: drop-shadow(0 0 30px #ff6ba8);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1);   filter: drop-shadow(0 0 30px #ff6ba8); }
      50%      { transform: scale(1.1); filter: drop-shadow(0 0 55px #ff6ba8); }
    }

    .intro-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-style: italic;
      color: #fff;
      text-shadow: 0 0 40px #ff6ba8, 0 0 80px #c9387a;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .intro-title span { color: #ff9ecb; }

    .intro-sub {
      font-size: 1.25rem; font-weight: 300; letter-spacing: 0.18em;
      color: #d4809e; text-transform: uppercase;
    }

    .divider {
      width: 180px; height: 1px;
      background: linear-gradient(90deg, transparent, #ff6ba8, transparent);
    }

    .start-btn {
      margin-top: 10px;
      padding: 16px 60px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-style: italic; letter-spacing: 0.12em;
      color: #fff;
      background: linear-gradient(135deg, #c9387a 0%, #ff6ba8 50%, #c9387a 100%);
      background-size: 200% 200%;
      border: none; border-radius: 60px; cursor: pointer;
      box-shadow: 0 0 30px #c9387a88, 0 4px 20px #0008;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .start-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 50px #ff6ba8aa, 0 6px 30px #0009;
    }
    .start-btn:active { transform: scale(0.97); }

    /* ── CUSTOMISE PANEL ── */
    #customize-panel {
      position: fixed; inset: 0; z-index: 8888;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,3,8,0.78);
      backdrop-filter: blur(12px);
      pointer-events: all;
    }
    #customize-panel.hidden { display: none; }

    .panel-card {
      background: linear-gradient(160deg, #2d0f22 0%, #1a0a14 100%);
      border: 1px solid #c9387a55;
      border-radius: 24px;
      padding: 40px 48px;
      width: min(540px, 94vw);
      box-shadow: 0 0 60px #c9387a33, 0 20px 60px #0009;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-style: italic; color: #ff9ecb;
      text-align: center; margin-bottom: 6px;
    }
    .panel-sub {
      text-align: center; color: #8a4060; font-size: 0.95rem;
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 30px;
    }

    .field { margin-bottom: 26px; }
    .field label {
      display: block; font-size: 0.8rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: #c9387a; margin-bottom: 10px;
    }

    /* radio pills */
    .pill-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill-group input { display: none; }
    .pill-group label {
      padding: 8px 22px;
      border: 1px solid #c9387a66;
      border-radius: 40px; cursor: pointer;
      color: #d4809e; font-size: 0.95rem; letter-spacing: 0.05em;
      transition: all 0.2s; margin: 0;
    }
    .pill-group input:checked + label {
      background: #c9387a; border-color: #c9387a; color: #fff;
      box-shadow: 0 0 14px #c9387a88;
    }
    .pill-group label:hover { border-color: #ff6ba8; color: #fff; }

    /* slider */
    .slider-row { display: flex; align-items: center; gap: 14px; }
    .slider-row input[type=range] {
      flex: 1; -webkit-appearance: none;
      height: 4px; border-radius: 4px;
      background: linear-gradient(90deg, #c9387a, #ff9ecb);
      outline: none;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: #ff6ba8;
      box-shadow: 0 0 10px #ff6ba8aa; cursor: pointer;
    }
    #height-val {
      min-width: 60px; text-align: right;
      color: #ff9ecb; font-size: 1rem; font-weight: 600;
    }

    .generate-btn {
      width: 100%; margin-top: 10px;
      padding: 15px;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-style: italic; letter-spacing: 0.1em;
      color: #fff; background: linear-gradient(135deg, #c9387a, #ff6ba8);
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 0 24px #c9387a66;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px #ff6ba8aa; }
    .generate-btn:active { transform: translateY(0); }

    /* ── HUD ── */
    #hud {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 500; display: none;
      background: rgba(10,3,8,0.7);
      border: 1px solid #c9387a44; border-radius: 50px;
      padding: 10px 28px; color: #d4809e; font-size: 0.82rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    #hud.visible { display: block; }

    /* greeting bubble inside VR scene needs to be HTML-overlay */
    #greeting-box {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -80px);
      z-index: 700; display: none;
      background: rgba(45,15,34,0.92);
      border: 1px solid #ff6ba8aa; border-radius: 20px;
      padding: 18px 32px; text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px #c9387a44;
      animation: fadeInUp 0.5s ease;
    }
    @keyframes fadeInUp {
      from { opacity:0; transform: translate(-50%, -60px); }
      to   { opacity:1; transform: translate(-50%, -80px); }
    }
    #greeting-box.visible { display: block; }
    #greeting-name {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 1.4rem; color: #ff9ecb; margin-bottom: 6px;
    }
    #greeting-msg { color: #d4809e; font-size: 1rem; line-height: 1.5; }

    /* dismiss greeting */
    #dismiss-btn {
      margin-top: 12px;
      padding: 6px 22px;
      font-family: 'Cormorant Garamond', serif; font-size: 0.85rem;
      color: #c9387a; background: transparent;
      border: 1px solid #c9387a66; border-radius: 30px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.1em;
    }
    #dismiss-btn:hover { background: #c9387a22; }

    /* reset button */
    #reset-btn {
      position: fixed; top: 20px; right: 20px; z-index: 600;
      display: none;
      padding: 8px 22px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #ff9ecb; background: rgba(45,15,34,0.8);
      border: 1px solid #c9387a55; border-radius: 30px;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    #reset-btn.visible { display: block; }
    #reset-btn:hover { background: #c9387a33; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     INTRO OVERLAY
════════════════════════════════════════════ -->
<div id="intro-overlay">
  <div class="hearts-bg" id="hearts-bg"></div>
  <div class="intro-content">
    <div class="cupid-icon">💘</div>
    <h1 class="intro-title">Virtual <span>Cupid</span></h1>
    <p class="intro-sub">Your Perfect Partner Awaits</p>
    <div class="divider"></div>
    <button class="start-btn" id="start-btn">✦ Begin Your Journey ✦</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     CUSTOMISE PANEL
════════════════════════════════════════════ -->
<div id="customize-panel" class="hidden">
  <div class="panel-card">
    <h2 class="panel-title">Design Your Partner</h2>
    <p class="panel-sub">Craft your ideal match</p>

    <!-- Gender -->
    <div class="field">
      <label>Gender</label>
      <div class="pill-group">
        <input type="radio" name="gender" id="g-male"     value="male"      checked>
        <label for="g-male">♂ Male</label>
        <input type="radio" name="gender" id="g-female"   value="female">
        <label for="g-female">♀ Female</label>
        <input type="radio" name="gender" id="g-nonbinary" value="nonbinary">
        <label for="g-nonbinary">⚧ Non-Binary</label>
      </div>
    </div>

    <!-- Height -->
    <div class="field">
      <label>Height</label>
      <div class="slider-row">
        <input type="range" id="height-slider" min="150" max="200" value="170" step="1">
        <span id="height-val">170 cm</span>
      </div>
    </div>

    <!-- Personality -->
    <div class="field">
      <label>Personality</label>
      <div class="pill-group">
        <input type="radio" name="personality" id="p-kind"         value="kind"         checked>
        <label for="p-kind">🤍 Kind</label>
        <input type="radio" name="personality" id="p-funny"        value="funny">
        <label for="p-funny">😄 Funny</label>
        <input type="radio" name="personality" id="p-intelligent"  value="intelligent">
        <label for="p-intelligent">🧠 Intelligent</label>
        <input type="radio" name="personality" id="p-adventurous"  value="adventurous">
        <label for="p-adventurous">🌟 Adventurous</label>
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">💘 Generate My Partner</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     GREETING BOX
════════════════════════════════════════════ -->
<div id="greeting-box">
  <div id="greeting-name"></div>
  <div id="greeting-msg"></div>
  <button id="dismiss-btn">Dismiss ✦</button>
</div>

<!-- RESET -->
<button id="reset-btn">↩ New Partner</button>

<!-- HUD -->
<div id="hud">WASD · Move &nbsp;|&nbsp; Mouse · Look &nbsp;|&nbsp; Q/E · Up/Down</div>

<!-- ═══════════════════════════════════════════
     A-FRAME SCENE
════════════════════════════════════════════ -->
<a-scene id="vr-scene" style="display:none;" background="color: #ffb3cc"
         fog="type: exponential; color: #ffb3cc; density: 0.04"
         vr-mode-ui="enabled: false">

  <!-- Assets -->
  <a-assets></a-assets>

  <!-- Sky gradient via sphere -->
  <a-sky color="#ffb3cc"></a-sky>

  <!-- Ground -->
  <a-plane position="0 0 0" rotation="-90 0 0"
           width="80" height="80"
           color="#f9d5e5" roughness="0.9"
           shadow="receive:true"></a-plane>

  <!-- Ambient soft lighting -->
  <a-light type="ambient" color="#ffe0ec" intensity="0.7"></a-light>
  <a-light type="directional" position="3 8 3" color="#fff0f5" intensity="0.9"
           shadow="cast:true;shadowMapWidth:1024;shadowMapHeight:1024"></a-light>
  <a-light type="point" position="-4 5 -4" color="#ff9ecb" intensity="0.5" distance="20"></a-light>

  <!-- Decorative floating hearts -->
  <a-entity id="heart-particles"></a-entity>

  <!-- Floor rose petals (discs) -->
  <a-entity id="petal-ring"></a-entity>

  <!-- Partner avatar group -->
  <a-entity id="avatar-group" position="0 0 -3" visible="false">
    <!-- built dynamically -->
  </a-entity>

  <!-- Scene title text (shown in world) -->
  <a-text value="Virtual Cupid" position="0 3.5 -6"
          align="center" color="#c9387a"
          font="https://cdn.aframe.io/fonts/DejaVu-sdf.fnt"
          width="8" side="double"></a-text>

  <!-- Camera rig with WASD + look-controls -->
  <a-entity id="rig" position="0 1.6 3">
    <a-camera look-controls="pointerLockEnabled: true"
              wasd-controls="acceleration: 20"
              cursor="fuse: false; rayOrigin: mouse">
    </a-camera>
  </a-entity>

</a-scene>

<!-- ═══════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════ -->
<script>
/* ─── Floating hearts in intro ─── */
(function spawnIntroHearts(){
  const bg = document.getElementById('hearts-bg');
  const symbols = ['💗','💕','💖','💘','💝','🌸','✨','💞'];
  for(let i=0;i<28;i++){
    const el = document.createElement('span');
    el.className = 'heart-float';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.fontSize = (0.8+Math.random()*1.6)+'rem';
    el.style.animationDuration = (8+Math.random()*14)+'s';
    el.style.animationDelay = (Math.random()*10)+'s';
    bg.appendChild(el);
  }
})();

/* ─── Height slider ─── */
const heightSlider = document.getElementById('height-slider');
const heightVal    = document.getElementById('height-val');
heightSlider.addEventListener('input', ()=>{
  heightVal.textContent = heightSlider.value + ' cm';
});

/* ─── START button ─── */
document.getElementById('start-btn').addEventListener('click', ()=>{
  document.getElementById('intro-overlay').classList.add('hidden');
  document.getElementById('customize-panel').classList.remove('hidden');
});

/* ─── Personality data ─── */
const personalityData = {
  kind: {
    greeting: "Hello, lovely soul! 🌸 My heart beats warmly just knowing you're here. I believe every moment is sweeter when shared with kindness.",
    aura: '#ff9ecb',
    name: 'Amore'
  },
  funny: {
    greeting: "Well, hello there! 😄 Did it hurt when you fell from the VR sky? Because you look like an angel—or maybe just a really good texture map!",
    aura: '#ffd166',
    name: 'Risa'
  },
  intelligent: {
    greeting: "Greetings. 🧠 Statistically, the probability of finding someone truly compatible is quite low — yet here you are, defying the odds magnificently.",
    aura: '#b8c0ff',
    name: 'Sage'
  },
  adventurous: {
    greeting: "Hey, explorer! 🌟 Life's too short for ordinary. Let's chase sunsets, climb impossible peaks, and write a story worth telling!",
    aura: '#06d6a0',
    name: 'Zara'
  }
};

/* ─── Gender data ─── */
const genderData = {
  male:      { bodyColor: '#5e8bc9', headColor: '#f4c89c', accentColor: '#3a5fa0', label: 'him' },
  female:    { bodyColor: '#e07aac', headColor: '#f9c9b0', accentColor: '#c9387a', label: 'her' },
  nonbinary: { bodyColor: '#9b71c9', headColor: '#f5d8c0', accentColor: '#6b3fb3', label: 'them' }
};

/* ─── Generate Partner ─── */
document.getElementById('generate-btn').addEventListener('click', ()=>{
  const gender      = document.querySelector('input[name=gender]:checked').value;
  const heightCm    = parseInt(heightSlider.value);
  const personality = document.querySelector('input[name=personality]:checked').value;

  // Hide panel, show scene
  document.getElementById('customize-panel').classList.add('hidden');
  document.getElementById('vr-scene').style.display = 'block';
  document.getElementById('hud').classList.add('visible');
  document.getElementById('reset-btn').classList.add('visible');

  // Build avatar
  buildAvatar(gender, heightCm, personality);

  // Show greeting after short delay
  setTimeout(()=>{
    showGreeting(personality, gender, heightCm);
  }, 1200);
});

/* ─── Build Avatar ─── */
function buildAvatar(gender, heightCm, personality){
  const scene   = document.querySelector('a-scene');
  const group   = document.getElementById('avatar-group');
  const pData   = personalityData[personality];
  const gData   = genderData[gender];

  // Scale: 150cm → 0.82, 200cm → 1.15
  const scale   = 0.82 + ((heightCm - 150) / 50) * 0.33;

  // Clear old avatar
  group.innerHTML = '';
  group.setAttribute('visible', 'true');
  group.setAttribute('scale', `${scale} ${scale} ${scale}`);
  group.setAttribute('position', '0 0 -3');

  // ── Head ──
  const head = document.createElement('a-sphere');
  head.setAttribute('position', '0 2.1 0');
  head.setAttribute('radius', gender === 'male' ? '0.32' : '0.28');
  head.setAttribute('color', gData.headColor);
  head.setAttribute('roughness', '0.6');
  head.setAttribute('shadow', 'cast:true');
  group.appendChild(head);

  // Eyes
  [-0.11, 0.11].forEach(x => {
    const eye = document.createElement('a-sphere');
    eye.setAttribute('position', `${x} 2.15 0.28`);
    eye.setAttribute('radius', '0.04');
    eye.setAttribute('color', '#1a0a14');
    group.appendChild(eye);
    // Pupil shine
    const shine = document.createElement('a-sphere');
    shine.setAttribute('position', `${x+0.015} 2.165 0.31`);
    shine.setAttribute('radius', '0.012');
    shine.setAttribute('color', '#ffffff');
    group.appendChild(shine);
  });

  // Smile
  const smile = document.createElement('a-torus');
  smile.setAttribute('position', '0 2.02 0.29');
  smile.setAttribute('radius', '0.07');
  smile.setAttribute('radius-tubular', '0.012');
  smile.setAttribute('arc', '180');
  smile.setAttribute('rotation', '0 0 0');
  smile.setAttribute('color', '#b05070');
  group.appendChild(smile);

  // Hair / hat detail
  if(gender === 'female'){
    const hair = document.createElement('a-sphere');
    hair.setAttribute('position', '0 2.34 0');
    hair.setAttribute('radius', '0.3');
    hair.setAttribute('scale', '1 0.55 1');
    hair.setAttribute('color', gData.accentColor);
    group.appendChild(hair);
    // Side bunches
    [-0.28, 0.28].forEach(x => {
      const bunch = document.createElement('a-sphere');
      bunch.setAttribute('position', `${x} 2.1 0`);
      bunch.setAttribute('radius', '0.18');
      bunch.setAttribute('color', gData.accentColor);
      group.appendChild(bunch);
    });
  } else if(gender === 'male'){
    const hairTop = document.createElement('a-sphere');
    hairTop.setAttribute('position', '0 2.36 -0.02');
    hairTop.setAttribute('radius', '0.31');
    hairTop.setAttribute('scale', '1 0.3 1');
    hairTop.setAttribute('color', '#3d2b1f');
    group.appendChild(hairTop);
  } else {
    // Non-binary: colourful swept hair
    [[-0.15,2.42,-0.05,'120deg'],[0.15,2.42,-0.05,'-120deg']].forEach(([x,y,z,rot])=>{
      const strand = document.createElement('a-cone');
      strand.setAttribute('position', `${x} ${y} ${z}`);
      strand.setAttribute('radius-bottom', '0.1');
      strand.setAttribute('radius-top', '0.01');
      strand.setAttribute('height', '0.3');
      strand.setAttribute('rotation', `0 0 ${rot}`);
      strand.setAttribute('color', gData.accentColor);
      group.appendChild(strand);
    });
  }

  // ── Neck ──
  const neck = document.createElement('a-cylinder');
  neck.setAttribute('position', '0 1.85 0');
  neck.setAttribute('radius', '0.1');
  neck.setAttribute('height', '0.22');
  neck.setAttribute('color', gData.headColor);
  group.appendChild(neck);

  // ── Torso ──
  const torso = document.createElement('a-box');
  if(gender === 'female'){
    torso.setAttribute('width', '0.55');
    torso.setAttribute('height', '0.75');
    torso.setAttribute('depth', '0.3');
  } else if(gender === 'male'){
    torso.setAttribute('width', '0.72');
    torso.setAttribute('height', '0.75');
    torso.setAttribute('depth', '0.34');
  } else {
    torso.setAttribute('width', '0.62');
    torso.setAttribute('height', '0.75');
    torso.setAttribute('depth', '0.31');
  }
  torso.setAttribute('position', '0 1.38 0');
  torso.setAttribute('color', gData.bodyColor);
  torso.setAttribute('roughness', '0.7');
  torso.setAttribute('shadow', 'cast:true');
  group.appendChild(torso);

  // Clothing detail stripe
  const stripe = document.createElement('a-plane');
  stripe.setAttribute('position', '0 1.45 0.16');
  stripe.setAttribute('width', '0.18');
  stripe.setAttribute('height', '0.45');
  stripe.setAttribute('color', gData.accentColor);
  stripe.setAttribute('side', 'double');
  group.appendChild(stripe);

  // ── Arms ──
  const armW = gender === 'male' ? 0.38 : 0.32;
  [[-1,0.5],[1,-0.5]].forEach(([side, rotZ])=>{
    const shoulder = (gender === 'male') ? 0.42 : 0.34;
    const arm = document.createElement('a-cylinder');
    arm.setAttribute('position', `${side*(shoulder+0.05)} 1.42 0`);
    arm.setAttribute('radius', '0.1');
    arm.setAttribute('height', '0.55');
    arm.setAttribute('rotation', `0 0 ${side*-25}`);
    arm.setAttribute('color', gData.headColor);
    arm.setAttribute('shadow', 'cast:true');
    group.appendChild(arm);

    // Hand
    const hand = document.createElement('a-sphere');
    hand.setAttribute('position', `${side*(shoulder+0.19)} 1.17 0`);
    hand.setAttribute('radius', '0.1');
    hand.setAttribute('color', gData.headColor);
    group.appendChild(hand);
  });

  // ── Hips ──
  const hips = document.createElement('a-box');
  const hipW = gender === 'female' ? '0.62' : gender === 'male' ? '0.68' : '0.6';
  hips.setAttribute('width', hipW);
  hips.setAttribute('height', '0.2');
  hips.setAttribute('depth', '0.32');
  hips.setAttribute('position', '0 0.97 0');
  hips.setAttribute('color', gData.accentColor);
  group.appendChild(hips);

  // ── Legs ──
  [-0.17,0.17].forEach(x=>{
    const leg = document.createElement('a-cylinder');
    leg.setAttribute('position', `${x} 0.56 0`);
    leg.setAttribute('radius', '0.11');
    leg.setAttribute('height', '0.75');
    leg.setAttribute('color', gender === 'female' ? '#f4c89c' : '#3d5a80');
    leg.setAttribute('shadow', 'cast:true');
    group.appendChild(leg);

    // Foot/shoe
    const foot = document.createElement('a-box');
    foot.setAttribute('position', `${x} 0.16 0.07`);
    foot.setAttribute('width', '0.16');
    foot.setAttribute('height', '0.12');
    foot.setAttribute('depth', '0.26');
    foot.setAttribute('color', gender === 'female' ? gData.accentColor : '#1a0a14');
    group.appendChild(foot);
  });

  // ── Aura glow ring ──
  const aura = document.createElement('a-torus');
  aura.setAttribute('position', '0 1.1 0');
  aura.setAttribute('radius', '0.7');
  aura.setAttribute('radius-tubular', '0.04');
  aura.setAttribute('rotation', '90 0 0');
  aura.setAttribute('color', pData.aura);
  aura.setAttribute('opacity', '0.55');
  aura.setAttribute('animation', `property: rotation; to: 90 360 0; dur: 5000; loop: true; easing: linear`);
  group.appendChild(aura);

  // ── Floating name tag ──
  const nameTag = document.createElement('a-text');
  nameTag.setAttribute('value', pData.name);
  nameTag.setAttribute('position', '0 3.0 0');
  nameTag.setAttribute('align', 'center');
  nameTag.setAttribute('color', '#ff9ecb');
  nameTag.setAttribute('width', '3');
  nameTag.setAttribute('side', 'double');
  nameTag.setAttribute('animation', `property: position; from: 0 2.95 0; to: 0 3.1 0; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine`);
  group.appendChild(nameTag);

  // ── Gentle idle rotation on avatar ──
  group.setAttribute('animation__rot',
    `property: rotation; from: 0 -15 0; to: 0 15 0; dur: 4000; loop: true; dir: alternate; easing: easeInOutSine`);

  // ── Build petal ring on ground ──
  buildPetalRing(pData.aura);

  // ── Floating hearts in scene ──
  buildSceneHearts();
}

function buildPetalRing(color){
  const ring = document.getElementById('petal-ring');
  ring.innerHTML = '';
  const count = 12;
  for(let i=0;i<count;i++){
    const angle = (i/count)*Math.PI*2;
    const r = 1.4;
    const petal = document.createElement('a-sphere');
    petal.setAttribute('position', `${Math.cos(angle)*r} 0.03 ${-3+Math.sin(angle)*r}`);
    petal.setAttribute('radius', '0.1');
    petal.setAttribute('color', color);
    petal.setAttribute('opacity', '0.7');
    ring.appendChild(petal);
  }
}

function buildSceneHearts(){
  const hp = document.getElementById('heart-particles');
  hp.innerHTML = '';
  for(let i=0;i<8;i++){
    const h = document.createElement('a-text');
    const angle = (i/8)*Math.PI*2;
    const r = 2.5;
    h.setAttribute('value', '💗');
    h.setAttribute('position', `${Math.cos(angle)*r} ${1.5+Math.random()*1.5} ${-3+Math.sin(angle)*r}`);
    h.setAttribute('align', 'center');
    h.setAttribute('width', '1.5');
    h.setAttribute('side', 'double');
    h.setAttribute('animation',
      `property: position; from: ${Math.cos(angle)*r} ${1.2+Math.random()} ${-3+Math.sin(angle)*r};
       to: ${Math.cos(angle)*r} ${2.2+Math.random()} ${-3+Math.sin(angle)*r};
       dur: ${2000+Math.random()*2000}; loop: true; dir: alternate; easing: easeInOutSine`
    );
    hp.appendChild(h);
  }
}

/* ─── Show Greeting ─── */
function showGreeting(personality, gender, heightCm){
  const pData = personalityData[personality];
  const gData = genderData[gender];
  document.getElementById('greeting-name').textContent =
    `${pData.name} says… (${heightCm}cm, ${gData.label}/they)`;
  document.getElementById('greeting-msg').textContent = pData.greeting;
  document.getElementById('greeting-box').classList.add('visible');
}

document.getElementById('dismiss-btn').addEventListener('click', ()=>{
  document.getElementById('greeting-box').classList.remove('visible');
});

/* ─── Reset ─── */
document.getElementById('reset-btn').addEventListener('click', ()=>{
  // Hide scene & HUD
  document.getElementById('vr-scene').style.display = 'none';
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('reset-btn').classList.remove('visible');
  document.getElementById('greeting-box').classList.remove('visible');
  document.getElementById('avatar-group').setAttribute('visible','false');
  // Show intro
  document.getElementById('intro-overlay').classList.remove('hidden');
});

/* ─── Prevent right-click context on canvas ─── */
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
