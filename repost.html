<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight Cafe: Hana's Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-main: #ff75a0;
            --pink-light: #ffdeeb;
            --accent: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Nunito', sans-serif; background: #000;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            transition: background-image 1s ease;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        /* Sprite Positioning */
        #character-sprite {
            position: absolute; bottom: 10%; left: 50%;
            transform: translateX(-50%); height: 85vh;
            transition: all 0.4s ease; filter: drop-shadow(0 0 20px rgba(0,0,0,0.4));
            z-index: 2; pointer-events: none;
        }

        /* Dialogue Box */
        #ui-box {
            position: relative; z-index: 10; width: 90%; max-width: 900px;
            margin: 0 auto 30px auto; background: var(--glass);
            border: 4px solid var(--pink-main); border-radius: 25px;
            padding: 25px; min-height: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer; backdrop-filter: blur(8px);
        }

        #name-tag {
            position: absolute; top: -25px; left: 30px;
            background: var(--pink-main); color: white;
            padding: 8px 30px; border-radius: 15px;
            font-family: 'Fredoka One', cursive; font-size: 1.4rem;
        }

        #dialogue-text {
            font-size: 1.3rem; color: #333; line-height: 1.5; font-weight: 600;
        }

        /* Choices */
        #choices-overlay {
            position: absolute; top: 30%; left: 50%;
            transform: translate(-50%, -50%); z-index: 20;
            display: flex; flex-direction: column; gap: 15px; width: 350px;
            display: none;
        }

        .choice-btn {
            background: white; border: 3px solid var(--accent);
            padding: 15px; border-radius: 50px; cursor: pointer;
            font-size: 1.1rem; font-weight: bold; color: var(--accent);
            transition: all 0.2s; text-align: center;
        }

        .choice-btn:hover {
            background: var(--accent); color: white; transform: scale(1.05);
        }

        /* Effects */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10th { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(0,0); }
        }

        #stats {
            position: absolute; top: 20px; left: 20px; z-index: 30;
            background: rgba(0,0,0,0.5); color: white; padding: 10px 20px;
            border-radius: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">💖 Hana Affection: <span id="points">0</span></div>
    
    <img id="character-sprite" src="" alt="">

    <div id="choices-overlay"></div>

    <div id="ui-box" onclick="handleInput()">
        <div id="name-tag">System</div>
        <div id="dialogue-text">Click to begin the date...</div>
    </div>
</div>

<script>
    // --- AUDIO SYSTEM ---
    const synth = window.speechSynthesis;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTextSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    function speak(text) {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        // Look for a female-sounding voice
        const voices = synth.getVoices();
        utterance.voice = voices.find(v => v.name.includes('Google') || v.name.includes('Female')) || voices[0];
        utterance.pitch = 1.2;
        utterance.rate = 1.0;
        synth.speak(utterance);
    }

    // --- STORY DATA ---
    const story = {
        start: {
            bg: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=1200",
            name: "Narrator",
            text: "You're waiting at 'Cafe Sakura'. Today is your first date with Hana, your childhood friend.",
            sprite: "",
            next: "hana_arrives"
        },
        hana_arrives: {
            name: "Hana",
            text: "Hey! Sorry I'm late! I... I had trouble picking out what to wear. Do I look okay?",
            sprite: "https://i.imgur.com/rM7pYn4.png", // Happy/Blush
            next: "choice_outfit"
        },
        choice_outfit: {
            name: "Hana",
            text: "She looks at you expectantly, her cheeks slightly pink.",
            choices: [
                { text: "You look incredibly beautiful, Hana.", next: "happy_reaction", points: 10 },
                { text: "It's fine. Let's just eat.", next: "sad_reaction", points: -5 }
            ]
        },
        happy_reaction: {
            name: "Hana",
            text: "Ehehe~ You always know exactly what to say! Let's go inside!",
            sprite: "https://i.imgur.com/vHqLd5E.png",
            next: "incident_start"
        },
        sad_reaction: {
            name: "Hana",
            text: "Oh... okay. I guess I overdid it then. Let's just go in.",
            sprite: "https://i.imgur.com/T0bA5G1.png",
            next: "incident_start"
        },
        incident_start: {
            bg: "https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1200",
            name: "Narrator",
            text: "As the waiter brings the coffee, he trips! The iced latte is flying straight toward Hana's new dress!",
            sprite: "https://i.imgur.com/T0bA5G1.png",
            shake: true,
            choices: [
                { text: "[Shield her with your jacket]", next: "hero_save", points: 20 },
                { text: "[Freeze in shock]", next: "fail_save", points: 0 }
            ]
        },
        hero_save: {
            name: "Hana",
            text: "Wait—! You... you ruined your favorite jacket just to save my dress? You're such a dork... but my dork.",
            sprite: "https://i.imgur.com/vHqLd5E.png",
            next: "ending"
        },
        fail_save: {
            name: "Hana",
            text: "Aaaah! My dress! It's ruined... This is the worst date ever!",
            sprite: "https://i.imgur.com/T0bA5G1.png",
            next: "ending"
        },
        ending: {
            name: "System",
            text: "End of Scene. Your bond with Hana has changed forever. Thanks for playing!",
            sprite: "",
            next: "start"
        }
    };

    // --- ENGINE LOGIC ---
    let currentKey = "start";
    let isTyping = false;
    let points = 0;

    function renderNode(key) {
        currentKey = key;
        const node = story[key];
        
        // Stats
        document.getElementById('points').innerText = points;

        // Visuals
        if(node.bg) document.getElementById('game-container').style.backgroundImage = `url(${node.bg})`;
        const sprite = document.getElementById('character-sprite');
        if(node.sprite) {
            sprite.src = node.sprite;
            sprite.style.opacity = 1;
        } else {
            sprite.style.opacity = 0;
        }

        // Effects
        if(node.shake) {
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 500);
        }

        // Voice and Text
        document.getElementById('name-tag').innerText = node.name;
        if(node.name !== "Narrator" && node.name !== "System") {
            speak(node.text);
        }
        
        typeText(node.text, () => {
            if(node.choices) {
                showChoices(node.choices);
            }
        });
    }

    function typeText(text, callback) {
        isTyping = true;
        const el = document.getElementById('dialogue-text');
        el.innerHTML = "";
        let i = 0;
        
        const interval = setInterval(() => {
            el.innerHTML += text[i];
            playTextSound();
            i++;
            if(i >= text.length) {
                clearInterval(interval);
                isTyping = false;
                callback();
            }
        }, 30);
    }

    function showChoices(choices) {
        const overlay = document.getElementById('choices-overlay');
        overlay.innerHTML = "";
        overlay.style.display = "flex";
        
        choices.forEach(c => {
            const b = document.createElement('div');
            b.className = "choice-btn";
            b.innerText = c.text;
            b.onclick = (e) => {
                e.stopPropagation();
                points += c.points;
                overlay.style.display = "none";
                renderNode(c.next);
            };
            overlay.appendChild(b);
        });
    }

    function handleInput() {
        if(isTyping) return;
        const node = story[currentKey];
        if(node.next) {
            renderNode(node.next);
        }
    }

    // Initialize
    window.onload = () => {
        // Ensure voices are loaded (some browsers need this)
        window.speechSynthesis.getVoices();
        renderNode("start");
    };
</script>

</body>
</html>
